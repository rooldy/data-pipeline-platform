name: CI — Data Pipeline Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend — pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements/test_light.txt
          

      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --ignore=tests/test_quality_tasks.py

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  # ── Frontend Type Check ───────────────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend — TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  # ── Docker Build Check ────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-typecheck]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build backend/ -t pipeline-backend:ci --quiet

      - name: Build frontend image
        run: |
          docker build frontend/ -t pipeline-frontend:ci --quiet